apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-patch
  namespace: example-patch
spec:
  template:
    spec:
      initContainers:
      - name: generate-index
        image: busybox:1.35
        command: ['sh', '-c']
        args:
        - |
          POD_NAME=$(cat /etc/hostname)
          sed "s/data-pod-name=''/data-pod-name='$POD_NAME'/" /html-source/index.html > /html/index.html
        volumeMounts:
        - name: html-source
          mountPath: /html-source
        - name: html-volume
          mountPath: /html
      containers:
      - name: nginx
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-source
        configMap:
          name: nginx-index
          defaultMode: 0644
      - name: html-volume
        emptyDir: {}

apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-index
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>Example Patch Application</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            }
            .container {
                background: white;
                padding: 40px;
                border-radius: 10px;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
                text-align: center;
            }
            h1 {
                color: #333;
                margin: 0 0 20px 0;
            }
            .info {
                font-size: 18px;
                color: #666;
                margin: 10px 0;
            }
            .pod-name {
                font-weight: bold;
                color: #667eea;
            }
            .timestamp {
                font-weight: bold;
                color: #764ba2;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Example Patch Application</h1>
            <div class="info">Pod Name: <span class="pod-name" id="podName">Loading...</span></div>
            <div class="info">Current Time: <span class="timestamp" id="timestamp">Loading...</span></div>
        </div>
        <script>
            // Get pod name from environment variable (set via downward API)
            const podName = document.body.getAttribute('data-pod-name') || 'Unknown';
            document.getElementById('podName').textContent = podName;
            
            // Update timestamp
            function updateTime() {
                const now = new Date();
                document.getElementById('timestamp').textContent = now.toLocaleString();
            }
            updateTime();
            setInterval(updateTime, 1000);
        </script>
    </body>
    </html>
